name: CI Pipeline

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

jobs:
  flutter-analysis:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          cd app
          flutter pub get

      - name: Analyze Code
        run: |
          cd app
          flutter analyze

      - name: Run Unit & Widget Tests
        run: |
          cd app
          flutter test --coverage

  functions-build:
    name: Cloud Functions Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install Dependencies
        run: |
          cd functions
          npm ci

      - name: Compile TypeScript
        run: |
          cd functions
          npm run build

  rules-validation:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify firestore.rules exists
        run: |
          test -f firestore.rules

  deploy:
    name: Deploy to Production
    needs: [flutter-analysis, functions-build, rules-validation]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: |
          cd functions
          npm ci
          cd ..
          firebase deploy --only firestore:rules,functions --project production
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

